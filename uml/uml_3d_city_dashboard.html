
<style>
  body { margin: 0; }
  .tab-bar { display: flex; gap: 8px; padding: 16px 16px 0; }
  .tab { padding: 7px 14px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; font-weight: 500; border: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-secondary); transition: all .15s; }
  .tab.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .panel { display: none; padding: 16px; overflow-x: auto; }
  .panel.active { display: block; }
  .mmd-wrap { min-height: 120px; }
  .mmd-wrap svg { max-width: 100%; height: auto !important; }
</style>

<div class="tab-bar">
  <button class="tab active" onclick="show(0)">Class diagram</button>
  <button class="tab" onclick="show(1)">LLM query flow</button>
  <button class="tab" onclick="show(2)">Project save / load</button>
</div>

<div id="p0" class="panel active"><div class="mmd-wrap" id="d0"></div></div>
<div id="p1" class="panel"><div class="mmd-wrap" id="d1"></div></div>
<div id="p2" class="panel"><div class="mmd-wrap" id="d2"></div></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a3a' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#1e2a2a' : '#e1f5ee',
    tertiaryColor: dark ? '#2a1e1a' : '#faece7',
    background: 'transparent',
    mainBkg: dark ? '#2a2a3a' : '#eeedfe',
    edgeLabelBackground: dark ? '#1a1a2a' : '#f5f4ff',
    sequenceNumberColor: dark ? '#c2c0b6' : '#26215C',
    actorBkg: dark ? '#2a2a3a' : '#eeedfe',
    actorBorder: dark ? '#534AB7' : '#534AB7',
    actorTextColor: dark ? '#c2c0b6' : '#26215C',
    actorLineColor: dark ? '#9c9a92' : '#73726c',
    signalColor: dark ? '#9c9a92' : '#73726c',
    signalTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    labelBoxBkgColor: dark ? '#1e2a2a' : '#e1f5ee',
    labelBoxBorderColor: dark ? '#0F6E56' : '#0F6E56',
    labelTextColor: dark ? '#9FE1CB' : '#085041',
    loopTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    noteBorderColor: dark ? '#854F0B' : '#854F0B',
    noteBkgColor: dark ? '#2a1e0a' : '#faeeda',
    noteTextColor: dark ? '#FAC775' : '#412402',
    activationBorderColor: dark ? '#534AB7' : '#534AB7',
    activationBkgColor: dark ? '#26215C' : '#EEEDFE',
  }
});

const diagrams = [
`classDiagram
    class User {
        +int id
        +string username
        +datetime created_at
        +to_dict() dict
    }
    class Project {
        +int id
        +string name
        +int user_id
        +string filters
        +datetime created_at
        +to_dict() dict
    }
    class Building {
        +string id
        +string name
        +string address
        +float height
        +string building_type
        +string zoning
        +float assessed_value
        +float lat
        +float lon
        +list footprint
    }
    class FilterSpec {
        +string attribute
        +string operator
        +string value
    }
    class FlaskApp {
        +get_buildings() list
        +apply_filter(buildings, filter_spec) list
        +describe_filter(filter_spec) string
        +GET /api/buildings
        +POST /api/query
        +POST /api/users
        +GET /api/projects/:username
        +POST /api/projects
        +DELETE /api/projects/:id
    }
    class DataFetcher {
        +fetch_buildings() list
        +get_cached_buildings() list
        -_get_zoning(building_type) string
        -_polygon_area(coords) float
    }
    class LLMService {
        +parse_query(query_text, hf_api_key) FilterSpec
        -_call_hf_api(query_text, api_key) dict
        -_rule_based_parse(query_text) dict
    }
    class CityView {
        +buildings Building[]
        +highlightedIds string[]
        +onBuildingClick callback
        -scene THREE.Scene
        -camera THREE.PerspectiveCamera
        -renderer THREE.WebGLRenderer
        -meshMap Map
        +latLonToXZ(lat, lon) Point
        +buildMeshes()
        +updateHighlights()
        +handleClick(event)
    }
    class App {
        +buildings Building[]
        +user User
        +activeFilter FilterSpec
        +highlightedIds string[]
        +projects Project[]
        +handleQuery(query, apiKey)
        +handleLogin(username)
        +handleSaveProject(name)
        +handleLoadProject(project)
    }
    User "1" --> "many" Project : owns
    Project "1" --> "many" FilterSpec : stores
    FilterSpec --> Building : filters
    FlaskApp --> DataFetcher : uses
    FlaskApp --> LLMService : uses
    FlaskApp --> User : persists
    FlaskApp --> Project : persists
    App --> CityView : renders
    App --> FlaskApp : calls API`,

`sequenceDiagram
    actor User
    participant Frontend as React Frontend
    participant Backend as Flask Backend
    participant HF as HuggingFace API
    participant OSM as OSM Overpass API
    participant DB as SQLite DB

    Note over Backend,OSM: On first startup
    Backend->>OSM: POST /api/interpreter (Overpass query)
    OSM-->>Backend: GeoJSON-style building data
    Backend->>Backend: Parse nodes/ways, compute height/zoning/value
    Backend->>Backend: Cache to buildings_cache.json

    Note over User,DB: Normal query flow
    User->>Frontend: Types query + clicks Search
    Frontend->>Backend: POST /api/query {query, hf_api_key}

    alt HF API key provided
        Backend->>HF: POST /models/Mistral-7B-Instruct (prompt)
        HF-->>Backend: Generated JSON filter spec
    else No API key (fallback)
        Backend->>Backend: Rule-based regex parsing
    end

    Backend->>Backend: apply_filter(buildings, filter_spec)
    Backend-->>Frontend: {filter_spec, matching_ids, description}
    Frontend->>Frontend: setHighlightedIds(matching_ids)
    Frontend->>Frontend: Three.js paint matched buildings orange`,

`sequenceDiagram
    actor User
    participant Frontend as React Frontend
    participant Backend as Flask Backend
    participant DB as SQLite DB

    User->>Frontend: Enters username + clicks Login
    Frontend->>Backend: POST /api/users {username}
    Backend->>DB: UPSERT User
    DB-->>Backend: User row
    Backend-->>Frontend: {id, username}
    Frontend->>Backend: GET /api/projects/:username
    Backend->>DB: SELECT Projects WHERE user_id = user.id
    DB-->>Backend: Project list
    Backend-->>Frontend: [{id, name, filters, ...}]
    Frontend->>Frontend: Render project list in sidebar

    User->>Frontend: Runs a query then clicks Save Project
    Frontend->>Backend: POST /api/projects {username, name, filters}
    Backend->>DB: INSERT Project (filters as JSON)
    DB-->>Backend: New project row
    Backend-->>Frontend: Project object (201)
    Frontend->>Frontend: Refresh project list

    User->>Frontend: Clicks Load on a saved project
    Frontend->>Frontend: Re-apply filter_spec to buildings
    Frontend->>Frontend: Highlight matching buildings in 3D view`
];

async function renderAll() {
  for (let i = 0; i < diagrams.length; i++) {
    try {
      const { svg } = await mermaid.render('mmd-svg-' + i, diagrams[i]);
      document.getElementById('d' + i).innerHTML = svg;
    } catch(e) {
      document.getElementById('d' + i).innerHTML = '<p style="color:var(--color-text-danger);font-size:13px">Render error: ' + e.message + '</p>';
    }
  }
}
renderAll();

window.show = function(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
};
</script>
